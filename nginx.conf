# Static-only: a landing page plus two self-contained Three.js demos under
# /linear/ and /simulation-figures/ (ES modules, vendored three.js,
# voiceover mp3s). No API.
server {
    listen 46750;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types application/javascript text/javascript text/css application/json image/svg+xml;
    gzip_min_length 1024;

    # Vendored three.js never changes (in each demo's /vendor/) — cache it hard.
    location ~* /vendor/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Voiceover audio (each demo's /vo/) — cache a while; byte-range requests
    # (which the audio analyser relies on) work by default.
    location ~* /vo/.*\.mp3$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # App shells + scripts change per deploy — never cache, so a rebuild is
    # always picked up. Directory requests resolve to each folder's index.html.
    location / {
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri $uri/ =404;
    }
}
